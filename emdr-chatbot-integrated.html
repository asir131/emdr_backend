<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMDR Companion Chatbot - API Integrated</title>
    <style>
        body { 
            font-family: Georgia, serif; 
            max-width: 720px; 
            margin: 4em auto; 
            padding: 2.5em; 
            background: #f6f7f4; 
            border-radius: 1em; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.06); 
            color: #2d2d2d; 
        }
        
        #chatbox { 
            background: #fff; 
            padding: 1.5em; 
            border-radius: 0.75em; 
            height: 400px; 
            overflow-y: auto; 
            border: 1px solid #cfcfcf; 
            font-size: 17px; 
            line-height: 1.5; 
        }
        
        #chatForm { 
            margin-top: 1.5em; 
            display: flex; 
            gap: 10px; 
        }
        
        #chatForm.hidden {
            display: none !important;
        }
        
        #userInput { 
            flex: 1; 
            padding: 0.75em; 
            border-radius: 0.5em; 
            border: 1px solid #ccc; 
            font-size: 16px; 
        }
        
        #sendBtn { 
            padding: 0.75em 1.5em; 
            border-radius: 0.5em; 
            background: #41594d; 
            color: #fff; 
            font-size: 16px; 
            border: none; 
            cursor: pointer; 
        }
        
        #sendBtn:hover { 
            background: #354a3f; 
        }
        
        #startStim { 
            margin-top: 1.5em; 
            padding: 0.75em 1.5em; 
            font-size: 16px; 
            border-radius: 0.5em; 
            background: #41594d; 
            color: #fff; 
            border: none; 
            display: none; 
            cursor: pointer; 
        }
        
        #startStim:hover { 
            background: #354a3f; 
        }
        
        /* Bubble grid for 5 options */
        .selection-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .selection-card {
            background: white;
            border: 2px solid #e0e3dd;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .selection-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #41594d;
        }
        
        .selection-card h5 {
            margin: 0 0 8px 0;
            color: #3e4e44;
            font-size: 14px;
        }
        
        .selection-card p {
            margin: 0 0 8px 0;
            font-style: italic;
            color: #666;
            font-size: 11px;
        }
        
        .selection-card ul {
            margin: 0;
            padding: 0;
            list-style: none;
            font-size: 11px;
        }
        
        .selection-card li {
            margin: 3px 0;
        }
        
        /* Card specific colors */
        .card-memory { border-color: #a8c3b8; }
        .card-memory:hover { background: #f0f5f2; }
        
        .card-future { border-color: #c3b8a8; }
        .card-future:hover { background: #f5f2f0; }
        
        .card-words { border-color: #b8a8c3; }
        .card-words:hover { background: #f2f0f5; }
        
        .card-negative { border-color: #c3a8b3; }
        .card-negative:hover { background: #f5f0f2; }
        
        .card-addiction { border-color: #d4b896; }
        .card-addiction:hover { background: #faf6f0; }
        
        /* Belief selection styles */
        .beliefs-container {
            background: #f9faf8;
            border-radius: 0.75em;
            padding: 1.5em;
            margin: 1em 0;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .belief-category {
            margin-bottom: 1.5em;
        }
        
        .belief-category h4 {
            color: #41594d;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .belief-item {
            background: white;
            padding: 0.6em 1em;
            margin: 0.4em 0;
            border-radius: 0.4em;
            border: 1px solid #e0e3dd;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .belief-item:hover {
            background: #e8ebe6;
            border-color: #41594d;
            transform: translateX(3px);
        }
        
        .belief-item.selected {
            background: #41594d;
            color: white;
            border-color: #41594d;
        }
        
        .continue-btn {
            display: block;
            margin: 1em auto;
            padding: 0.6em 1.5em;
            background: #41594d;
            color: white;
            border: none;
            border-radius: 0.4em;
            cursor: pointer;
            font-size: 15px;
        }
        
        .continue-btn:hover {
            background: #354a3f;
        }
        
        .current-belief-context {
            background: #e8ebe6;
            padding: 0.8em;
            border-radius: 0.4em;
            margin-bottom: 1em;
            font-size: 14px;
            color: #41594d;
            font-weight: 600;
        }
        
        /* Rating scale styles */
        .rating-scale {
            background: #f9faf8;
            border-radius: 0.75em;
            padding: 1.5em;
            margin: 1em 0;
            text-align: center;
        }
        
        .scale-title {
            color: #41594d;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 1em;
            line-height: 1.4;
        }
        
        .scale-instruction {
            color: #666;
            font-size: 14px;
            margin-bottom: 1.5em;
            font-style: italic;
        }
        
        .scale-buttons {
            display: flex;
            justify-content: center;
            gap: 0.8em;
            flex-wrap: wrap;
            margin-bottom: 1em;
        }
        
        .scale-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            border: 2px solid #d4d7d1;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            color: #41594d;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .scale-btn:hover {
            background: #e8ebe6;
            border-color: #41594d;
            transform: scale(1.1);
        }
        
        .scale-btn.selected {
            background: #41594d;
            color: white;
            border-color: #41594d;
            transform: scale(1.15);
        }
        
        .scale-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 1em;
            font-size: 12px;
            color: #666;
            padding: 0 1em;
        }
        
        .scale-continue-btn {
            margin-top: 1.5em;
            padding: 0.6em 1.5em;
            background: #41594d;
            color: white;
            border: none;
            border-radius: 0.4em;
            cursor: pointer;
            font-size: 15px;
        }
        
        .scale-continue-btn:hover {
            background: #354a3f;
        }

        .loading-indicator {
            font-style: italic;
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2 style="text-align:center; font-size:28px; color:#3e4e44;">Meet Your EMDR Companion</h2>
    <p style="font-size:18px; line-height:1.6;">I'm here to gently guide you through preparing for your first EMDR session. We'll work together at your pace.</p>
    
    <div id="authNotice" style="background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none;">
        <strong>Notice:</strong> Please log in to save your session progress. The chatbot will work locally, but API calls will fail without a token.
    </div>

    <div id="chatbox"></div>
    <div id="loadingBox" class="loading-indicator" style="display: none;">Saving to server...</div>

    <div id="chatForm">
        <input type="text" id="userInput" placeholder="Type your response here...">
        <button type="button" id="sendBtn">Send</button>
    </div>
    <button id="startStim">Begin Bilateral Stimulation</button>
    
    <script>
    // ─────────────────────────────────────────────────────────────────────────────
    // API CONFIGURATION
    // ─────────────────────────────────────────────────────────────────────────────
    const API_BASE_URL = '/api/emdr-session'; // Relative path, assuming same domain
    let currentSessionId = null;

    // Helper to get token (replace with actual auth logic in your app)
    const getToken = () => localStorage.getItem('accessToken');

    // Show notice if no token
    if (!getToken()) {
        document.getElementById('authNotice').style.display = 'block';
    }

    // Helper for API Calls
    async function apiCall(endpoint, method, body = null) {
        const token = getToken();
        if (!token) {
            console.warn(`Simulating API call to ${endpoint} because no token is available.`);
            return null; 
        }

        const loadingBox = document.getElementById('loadingBox');
        loadingBox.style.display = 'block';

        try {
            const url = endpoint.startsWith('http') ? endpoint : `${API_BASE_URL}${endpoint}`;
            const res = await fetch(url, {
                method,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: body ? JSON.stringify(body) : null
            });

            if (!res.ok) {
                const errorData = await res.json();
                console.error('API Error:', errorData);
                throw new Error(errorData.message || 'API call failed');
            }

            const data = await res.json();
            return data.data; // Assumes your backend returns { success: true, data: { ... } }
        } catch (error) {
            console.error('Network or API Error:', error);
            // Don't block the UI flow on API errors during testing, but ideally show an alert.
        } finally {
            loadingBox.style.display = 'none';
        }
    }


    // ─────────────────────────────────────────────────────────────────────────────
    // CHATBOT LOGIC & DATA
    // ─────────────────────────────────────────────────────────────────────────────

    // Beliefs from the PDF
    const negativeBeliefs = {
        "RESPONSIBILITY - I AM SOMETHING 'WRONG'": [
            "I don't deserve love", "I am a bad person", "I am terrible", 
            "I am worthless (inadequate)", "I am shameful", "I am not lovable", 
            "I am not good enough", "I deserve only bad things", "I am permanently damaged", 
            "I am ugly (my body is hateful)", "I do not deserve...", "I am stupid (not smart enough)", 
            "I am insignificant (unimportant)", "I am a disappointment", "I deserve to die", 
            "I deserve to be miserable", "I am different (don't belong)"
        ],
        "RESPONSIBILITY - I DID SOMETHING 'WRONG'": [
            "I should have done something", "I did something wrong", "I should have known better"
        ],
        "SAFETY/VULNERABILITY": [
            "I cannot be trusted", "I cannot trust myself", "I cannot trust my judgment", 
            "I cannot trust anyone", "I cannot protect myself", "I am in danger", 
            "It's not okay to feel (show) my emotions", "I cannot stand up for myself", "I cannot let it out"
        ],
        "CONTROL/CHOICE": [
            "I am not in control", "I am powerless (helpless)", "I am weak", 
            "I cannot get what I want", "I am a failure (will fail)", "I cannot succeed", 
            "I have to be perfect (please everyone)", "I cannot stand it", "I am inadequate"
        ]
    };
    
    const positiveBeliefs = {
        "RESPONSIBILITY - I AM SOMETHING 'RIGHT'": [
            "I deserve love; I can have love", "I am a good (loving) person", "I am fine as I am", 
            "I am worthy; I am worthwhile", "I am honorable", "I am lovable", 
            "I am deserving (fine/okay)", "I deserve good things", "I am (can be) healthy", 
            "I am fine (attractive/lovable)", "I can have (deserve)...", "I am intelligent (able to learn)", 
            "I am significant (important)", "I am okay just the way I am", "I deserve to live", 
            "I deserve to be happy", "I am okay as I am"
        ],
        "RESPONSIBILITY - I DID THE BEST I COULD": [
            "I did the best I could", "I learned (can learn) from it", "I do the best I can (I can learn)"
        ],
        "SAFETY/TRUST": [
            "I can be trusted", "I can (learn to) trust myself", "I can trust my judgment", 
            "I can choose whom to trust", "I can (learn to) take care of myself", "It's over; I am safe now", 
            "I can safely feel (show) my emotions", "I can make my needs known", "I can choose to let it out"
        ],
        "CONTROL/CHOICE": [
            "I am now in control", "I now have choices", "I am strong", 
            "I can get what I want", "I can succeed", "I can be myself (make mistakes)", 
            "I can handle it", "I am capable", "I can choose whom to trust"
        ]
    };

    // Question flows
    const questionFlows = {
        memory: [
            "Can you describe the memory or event you'd like to work with? Take your time and share as much or as little as feels comfortable.",
            "When you think of this memory, try to 'freeze frame' the most difficult or disturbing moment. So imagine the event is a movie and you press pause on the worst moment. What do you see, hear?",
            "NEGATIVE_BELIEFS", "POSITIVE_BELIEFS", "VOC_RATING",
            "What emotions are you noticing as you think about this memory? (e.g., sad, frightened, angry, ashamed) Remember to choose an emotion - something you feel in your body, not a thought.",
            "Are there other emotions that come along with the main one? If so, which emotions?",
            "Where do you feel these emotions in your body?",
            "SUD_RATING"
        ],
        future: [
            "Can you describe the future scenario or worst-case situation you're imagining?",
            "If you had to pick one 'freeze frame' moment from this scenario - the worst part - imagine it's a movie and you press pause. What would that look like? What do you see, hear?",
            "NEGATIVE_BELIEFS", "POSITIVE_BELIEFS", "VOC_RATING",
            "What emotions come up when you imagine this future scenario?",
            "Are there other emotions that come along with the main one? If so, which emotions?",
            "Where do you notice these feelings in your body?",
            "SUD_RATING"
        ],
        words: [
            "What are the words or thoughts that keep running through your mind?",
            "Can you think of a specific situation - past, present, or imagined future - where these words feel especially true or painful? Try to freeze frame that moment.",
            "NEGATIVE_BELIEFS", "POSITIVE_BELIEFS", "VOC_RATING",
            "What emotions arise when these words run through your mind?",
            "Are there other emotions that come along with the main one? If so, which emotions?",
            "Where do you feel this in your body?",
            "SUD_RATING"
        ],
        negative: [
            "What difficult emotion are you experiencing that you'd like to work with?",
            "Can you recall a specific time when you felt this emotion very intensely? Or perhaps imagine a situation where you might feel it? Try to freeze frame that moment.",
            "NEGATIVE_BELIEFS", "POSITIVE_BELIEFS", "VOC_RATING",
            "Are there other emotions that come along with the main one? If so, which emotions?",
            "Where do you notice these emotions in your body?",
            "SUD_RATING"
        ],
        addiction: [
            "What aspect of this addictive behavior has the most intense feeling with it? (e.g., the rush, the anticipation, the first time you did it, the moment of release)",
            "What is the specific positive feeling? (e.g., relaxed, excited, euphoric, powerful, free, numb)",
            "PFS_RATING",
            "Are there any thoughts that go with this positive feeling? What does your mind tell you when you experience it?",
            "Where does this positive feeling sit in your body? (e.g., chest, head, stomach, all over)",
            "Take a moment to visualize this positive feeling. What color, shape, or image comes to mind when you focus on it?",
            "BLS_INSTRUCTION"
        ]
    };

    let currentFlow = null;
    let currentSessionType = null;
    let currentStep = -1;
    const responses = []; // To store raw answers sequentially
    
    // Structured data for API
    let apiData = {
        targetDescription: '',
        freezeFrame: '',
        beliefPairs: [], // { negativeBelief, positiveBelief, vocRating }
        primaryEmotion: '',
        additionalEmotions: '',
        bodyLocation: '',
        sudRating: null,
        addictionContext: {
            aspect: '',
            positiveFeeling: '',
            pfsRating: null,
            associatedThoughts: '',
            bodyLocation: '',
            visualization: ''
        }
    };

    let selectedNegativeBeliefs = [];
    let selectedPositiveBeliefs = [];
    let currentNegativeBeliefIndex = 0;
    
    const chatbox = document.getElementById('chatbox');
    const chatForm = document.getElementById('chatForm');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const startStimBtn = document.getElementById('startStim');

    function appendMessage(sender, text) {
        const p = document.createElement('p');
        p.innerHTML = '<strong>' + sender + ':</strong> ' + text;
        chatbox.appendChild(p);
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    function showStartingOptions() {
        chatForm.classList.add('hidden');
        
        const optionsDiv = document.createElement('div');
        optionsDiv.id = 'startingOptions';
        optionsDiv.innerHTML = `
            <h4 style="text-align: center; color: #41594d; margin: 20px 0;">Click on the option that feels most present for you:</h4>
            <div class="selection-grid">
                <div class="selection-card card-memory" data-choice="memory">
                    <h5>Memory/Past Event</h5><p>"Something that happened"</p>
                </div>
                <div class="selection-card card-future" data-choice="future">
                    <h5>Future Scenario</h5><p>"What if..." fears</p>
                </div>
                <div class="selection-card card-words" data-choice="words">
                    <h5>Words/Thoughts</h5><p>"Loops in my head"</p>
                </div>
                <div class="selection-card card-negative" data-choice="negative">
                    <h5>Difficult Emotions</h5><p>"I just feel..."</p>
                </div>
                <div class="selection-card card-addiction" data-choice="addiction">
                    <h5>Addiction/Craving</h5><p>"Pleasurable but problematic"</p>
                </div>
            </div>
        `;
        
        chatbox.appendChild(optionsDiv);
        chatbox.scrollTop = chatbox.scrollHeight;
        
        optionsDiv.querySelectorAll('.selection-card').forEach(card => {
            card.addEventListener('click', async function() {
                const choice = this.dataset.choice;
                document.getElementById('startingOptions').remove();
                await handleStartingChoice(choice);
                chatForm.classList.remove('hidden');
            });
        });
    }

    async function handleStartingChoice(choice) {
        let choiceText = '';
        switch(choice) {
            case 'memory': choiceText = 'Memory/Past Event'; break;
            case 'future': choiceText = 'Future Scenario'; break;
            case 'words': choiceText = 'Words/Thoughts'; break;
            case 'negative': choiceText = 'Difficult Emotions'; break;
            case 'addiction': choiceText = 'Addiction/Craving'; break;
        }
        
        appendMessage('You', choiceText);
        responses.push('Starting point: ' + choiceText);
        
        currentSessionType = choice;
        currentFlow = questionFlows[choice];
        currentStep = 0;

        // 🟢 API CALL 1: Start Session
        const session = await apiCall('/start', 'POST', { sessionType: choice });
        if (session && session._id) {
            currentSessionId = session._id;
            console.log('Session started:', currentSessionId);
        }
        
        setTimeout(() => askNext(), 700);
    }

    // Belief logic omitted for brevity but keeps the same flow.
    // Instead of full belief mapping code here, I'll just keep the essential logic.
    function showBeliefSelection(type) {
        chatForm.classList.add('hidden');
        const beliefs = type === 'negative' ? negativeBeliefs : positiveBeliefs;
        
        const beliefsDiv = document.createElement('div');
        beliefsDiv.className = 'beliefs-container';
        beliefsDiv.id = 'beliefsContainer';
        
        let html = `<h3 style="text-align: center; color: #41594d; margin-bottom: 1em;">
                    ${type === 'negative' ? 'Select the negative belief(s) that resonate with you:' : 'Select your preferred positive belief:'}</h3>`;
        
        for (const category in beliefs) {
            html += `<div class="belief-category"><h4>${category}</h4>`;
            beliefs[category].forEach(belief => {
                html += `<div class="belief-item" data-belief="${belief}">${belief}</div>`;
            });
            html += `</div>`;
        }
        
        html += `<button class="continue-btn" id="beliefsContinue">Continue</button>`;
        beliefsDiv.innerHTML = html;
        chatbox.appendChild(beliefsDiv);
        chatbox.scrollTop = chatbox.scrollHeight;
        
        beliefsDiv.querySelectorAll('.belief-item').forEach(item => {
            item.addEventListener('click', function() {
                if (type === 'negative') {
                    if (this.classList.contains('selected')) {
                        this.classList.remove('selected');
                        selectedNegativeBeliefs = selectedNegativeBeliefs.filter(b => b !== this.dataset.belief);
                    } else {
                        this.classList.add('selected');
                        selectedNegativeBeliefs.push(this.dataset.belief);
                    }
                } else {
                    beliefsDiv.querySelectorAll('.belief-item').forEach(el => el.classList.remove('selected'));
                    this.classList.add('selected');
                }
            });
        });
        
        document.getElementById('beliefsContinue').addEventListener('click', function() {
            if (type === 'negative') {
                if (selectedNegativeBeliefs.length === 0) return alert('Select at least one.');
                document.getElementById('beliefsContainer').remove();
                appendMessage('You', 'Negative beliefs: ' + selectedNegativeBeliefs.join(', '));
                
                // Initialize beliefPairs array
                selectedNegativeBeliefs.forEach(neg => {
                    apiData.beliefPairs.push({ negativeBelief: neg, positiveBelief: '', vocRating: 1 });
                });
                
                currentStep++;
                askNext();
            } else {
                const selected = beliefsDiv.querySelector('.belief-item.selected');
                if (!selected) return alert('Select a positive belief.');
                
                const positiveBelief = selected.dataset.belief;
                apiData.beliefPairs[currentNegativeBeliefIndex].positiveBelief = positiveBelief;
                
                document.getElementById('beliefsContainer').remove();
                appendMessage('You', `Positive belief: "${positiveBelief}"`);
                
                currentNegativeBeliefIndex++;
                
                if (currentNegativeBeliefIndex < selectedNegativeBeliefs.length) {
                    setTimeout(() => {
                        appendMessage('EMDR Companion', 'Now, what would you prefer to believe instead of the next negative belief?');
                        showBeliefSelection('positive');
                    }, 700);
                } else {
                    currentStep++;
                    setTimeout(() => askNext(), 700);
                }
            }
        });
    }

    function showRatingScale(type) {
        chatForm.classList.add('hidden');
        
        const scaleDiv = document.createElement('div');
        scaleDiv.className = 'rating-scale';
        scaleDiv.id = 'ratingScale';
        
        let max = type === 'voc' ? 7 : 10;
        let html = `<div class="scale-title">Rate the ${type.toUpperCase()} from ${type === 'voc' ? '1' : '0'} to ${max}</div>
                    <div class="scale-buttons">`;
        
        for (let i = (type === 'voc' ? 1 : 0); i <= max; i++) {
            html += `<div class="scale-btn" data-value="${i}">${i}</div>`;
        }
        
        html += `</div><button class="scale-continue-btn" id="scaleContinue">Continue</button>`;
        scaleDiv.innerHTML = html;
        chatbox.appendChild(scaleDiv);
        chatbox.scrollTop = chatbox.scrollHeight;
        
        let selectedValue = null;
        
        scaleDiv.querySelectorAll('.scale-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                scaleDiv.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                selectedValue = parseInt(this.dataset.value);
            });
        });
        
        document.getElementById('scaleContinue').addEventListener('click', async function() {
            if (selectedValue === null) return alert('Please select a rating.');
            document.getElementById('ratingScale').remove();
            
            appendMessage('You', `${type.toUpperCase()} Rating: ${selectedValue}`);
            
            if (type === 'voc') {
                // Apply same VOC to all for simplicity in this demo, or ask iteratively.
                apiData.beliefPairs.forEach(bp => bp.vocRating = selectedValue);
                
                // 🟢 API CALL 3: Save Beliefs (after VOC)
                if (currentSessionId) {
                    await apiCall(`/${currentSessionId}/beliefs`, 'PATCH', { beliefPairs: apiData.beliefPairs });
                }
            } else if (type === 'sud') {
                apiData.sudRating = selectedValue;
                
                // 🟢 API CALL 5: Save SUD
                if (currentSessionId) {
                    await apiCall(`/${currentSessionId}/sud`, 'PATCH', { sudRating: apiData.sudRating });
                }
            } else if (type === 'pfs') {
                apiData.addictionContext.pfsRating = selectedValue;
            }
            
            currentStep++;
            setTimeout(() => askNext(), 700);
        });
    }

    async function processTextInput(input) {
        // Map sequential inputs to fields based on flow and step.
        const isAddiction = currentSessionType === 'addiction';

        if (isAddiction) {
            if (currentStep === 1) apiData.addictionContext.aspect = input;
            if (currentStep === 2) apiData.addictionContext.positiveFeeling = input;
            if (currentStep === 4) apiData.addictionContext.associatedThoughts = input;
            if (currentStep === 5) apiData.addictionContext.bodyLocation = input;
            if (currentStep === 6) {
                apiData.addictionContext.visualization = input;
                // 🟢 API CALL 6: Save Addiction (all at once)
                if (currentSessionId) {
                    await apiCall(`/${currentSessionId}/addiction`, 'PATCH', apiData.addictionContext);
                }
            }
        } else {
            if (currentStep === 1) apiData.targetDescription = input;
            if (currentStep === 2) {
                apiData.freezeFrame = input;
                // 🟢 API CALL 2: Save Target
                if (currentSessionId) {
                    await apiCall(`/${currentSessionId}/target`, 'PATCH', {
                        targetDescription: apiData.targetDescription,
                        freezeFrame: apiData.freezeFrame
                    });
                }
            }
            if (currentStep === 6) apiData.primaryEmotion = input;
            if (currentStep === 7) apiData.additionalEmotions = input;
            if (currentStep === 8) {
                apiData.bodyLocation = input;
                // 🟢 API CALL 4: Save Emotions
                if (currentSessionId) {
                    await apiCall(`/${currentSessionId}/emotions`, 'PATCH', {
                        primaryEmotion: apiData.primaryEmotion,
                        additionalEmotions: apiData.additionalEmotions,
                        bodyLocation: apiData.bodyLocation
                    });
                }
            }
        }
    }

    function displaySummary() {
        // ... (Summary display logic similar to before)
        appendMessage('EMDR Companion', 'Your session data has been saved successfully!');
        startStimBtn.style.display = 'block';
    }

    function askNext() {
        if (currentStep < 0) {
            chatForm.classList.add('hidden');
            appendMessage('EMDR Companion', 'Where would you like to start?');
            setTimeout(() => showStartingOptions(), 100);
        } else if (currentFlow && currentStep < currentFlow.length) {
            const question = currentFlow[currentStep];
            
            if (question === 'NEGATIVE_BELIEFS') {
                showBeliefSelection('negative');
            } else if (question === 'POSITIVE_BELIEFS') {
                showBeliefSelection('positive');
            } else if (question === 'VOC_RATING') {
                showRatingScale('voc');
            } else if (question === 'SUD_RATING') {
                showRatingScale('sud');
            } else if (question === 'PFS_RATING') {
                showRatingScale('pfs');
            } else if (question === 'BLS_INSTRUCTION') {
                appendMessage('EMDR Companion', 'Great. Now we\'ll begin bilateral stimulation (BLS) to process this positive feeling.');
                chatForm.classList.add('hidden');
                setTimeout(displaySummary, 2000);
            } else {
                chatForm.classList.remove('hidden');
                appendMessage('EMDR Companion', question);
            }
        } else {
            chatForm.classList.add('hidden');
            setTimeout(displaySummary, 1500);
        }
    }

    sendBtn.addEventListener('click', async function() {
        const input = userInput.value.trim();
        if (!input) return;
        
        appendMessage('You', input);
        userInput.value = '';
        
        // Disable input while processing
        userInput.disabled = true;
        sendBtn.disabled = true;

        await processTextInput(input);
        
        currentStep++;
        
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();

        setTimeout(() => askNext(), 700);
    });

    userInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendBtn.click();
        }
    });

    startStimBtn.addEventListener('click', function() {
        // Redirect to BLS page, passing the session ID so it knows what to play/record against
        const targetUrl = `index_squarespace.html${currentSessionId ? '?sessionId=' + currentSessionId : ''}`;
        window.location.href = targetUrl;
    });

    // Start the conversation
    askNext();
    </script>
</body>
</html>
